name: Build DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "AI SSH Client" main.py

    - name: Create DMG
      run: |
        hdiutil create -volname "AI SSH Client" -srcfolder dist/"AI SSH Client".app -ov -format UDZO "AI-SSH-Client-${{ github.ref_name }}.dmg"

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: AI-SSH-Client-dmg
        path: "*.dmg"

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: "*.dmg"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
